name: ZestyEQ
options:
  bundleIdPrefix: com.zestyeq
  deploymentTarget:
    iOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.7"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: ZestyEQ-Simple/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.zestyeq.ios
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    COPY_PHASE_STRIP: NO

targets:
  ZestyEQ:
    type: application
    platform: iOS
    sources:
      - path: ZestyEQ-Simple
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: ZestyEQ-Simple/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zestyeq.ios
    info:
      path: ZestyEQ-Simple/Resources/Info.plist
    dependencies: []
    preBuildScripts:
      - name: "Copy JavaScript Resources"
        script: |
          rsync -av --exclude='.gitkeep' "${SRCROOT}/ZestyEQ-Simple/Resources/" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/"
        basedOnDependencyAnalysis: false
