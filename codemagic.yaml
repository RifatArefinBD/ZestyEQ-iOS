workflows:
  ios-build:
    name: Zesty EQ iOS
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations: []
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
    environment:
      vars:
        APP_NAME: ZestyEQ
        XCODE_WORKSPACE: ZestyEQ.xcodeproj
        XCODE_SCHEME: ZestyEQ
        BUNDLE_ID: com.zestyeq.ios
      xcode: 16.0
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build for simulator
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Build for device (unsigned)
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Create unsigned IPA
        script: |
          APP_PATH=$(find .build -name "${APP_NAME}.app" -type d | head -1)
          PAYLOAD_DIR=".build/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          cd .build
          zip -r "${APP_NAME}.unsigned.ipa" Payload/
          cd ..
          echo "Unsigned IPA created at .build/${APP_NAME}.unsigned.ipa"
      - name: Publish to GitHub Release (if tagged)
        script: |
          if [ -n "$CM_TAG" ]; then
            export PATH="/usr/local/share/npm/bin:$PATH"
            IPA_PATH=".build/${APP_NAME}.unsigned.ipa"
            gh release create "$CM_TAG" \
              --title "Zesty EQ $CM_TAG" \
              --notes "Automated build for Zesty EQ iOS" \
              "$IPA_PATH" \
              --repo "RifatArefinBD/ZestyEQ-iOS"
          else
            echo "No tag - skipping GitHub Release"
          fi
    artifacts:
      - .build/**/*.ipa
      - .build/Build/Products/**/*.app
      - .build/Build/Products/**/*.dSYM.zip
    publishing: {}
