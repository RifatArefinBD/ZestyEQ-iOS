workflows:
  ios-build:
    name: Zesty EQ iOS
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations: []
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
    environment:
      vars:
        APP_NAME: ZestyEQ
        XCODE_WORKSPACE: ZestyEQ.xcodeproj
        XCODE_SCHEME: ZestyEQ
        BUNDLE_ID: com.zestyeq.ios
      xcode: 16.0
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build for simulator
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Build for device (unsigned)
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Create unsigned IPA
        script: |
          set -e
          echo "Looking for .app bundles..."
          find .build -name "*.app" -type d
          APP_PATH=$(find .build -path "*/Debug-iphoneos/*" -name "${APP_NAME}.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find .build -name "${APP_NAME}.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ${APP_NAME}.app in .build/"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          PAYLOAD_DIR=".build/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          cd .build
          zip -r "${APP_NAME}.unsigned.ipa" Payload/
          cd ..
          echo "Unsigned IPA created at .build/${APP_NAME}.unsigned.ipa"
      - name: Launch test in simulator
        script: |
          set -e
          SIM_APP_PATH=$(find .build -path "*/Debug-iphonesimulator/*" -name "${APP_NAME}.app" -type d | head -1)
          if [ -z "$SIM_APP_PATH" ]; then
            echo "No simulator build found - skipping launch test"
            exit 0
          fi
          echo "Found simulator app at: $SIM_APP_PATH"
          # Get available runtime
          RUNTIME=$(xcrun simctl list runtimes | grep -o 'iOS [0-9.-]*' | tail -1)
          echo "Using runtime: $RUNTIME"
          # Create and boot simulator
          DEVICE_NAME="ZestyEQ-Test-$(date +%s)"
          DEVICE_UDID=$(xcrun simctl create "$DEVICE_NAME" "iPhone 15" "$RUNTIME")
          echo "Created device: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID"
          # Wait for boot
          xcrun simctl wait "$DEVICE_UDID" booted
          # Install and launch
          xcrun simctl install "$DEVICE_UDID" "$SIM_APP_PATH"
          xcrun simctl launch "$DEVICE_UDID" "$BUNDLE_ID"
          # Wait for app to render
          sleep 10
          # Take screenshot
          mkdir -p .build/screenshots
          xcrun simctl screenshot "$DEVICE_UDID" ".build/screenshots/launch.png"
          echo "Screenshot saved"
          # Cleanup
          xcrun simctl shutdown "$DEVICE_UDID"
          xcrun simctl delete "$DEVICE_UDID"
      - name: Publish to GitHub Release (if tagged)
        script: |
          if [ -z "$CM_TAG" ]; then
            echo "No tag - skipping GitHub Release"
          elif [ -z "$GITHUB_TOKEN" ]; then
            echo "GITHUB_TOKEN not set - skipping GitHub Release"
            echo "IPA is still available as a build artifact below."
          else
            export PATH="/usr/local/share/npm/bin:$PATH"
            IPA_PATH=".build/${APP_NAME}.unsigned.ipa"
            gh release create "$CM_TAG" \
              --title "Zesty EQ $CM_TAG" \
              --notes "Download the unsigned IPA below and install via TrollStore, Sideloadly, AltStore, or jailbreak." \
              "$IPA_PATH" \
              --repo "RifatArefinBD/ZestyEQ-iOS"
          fi
    artifacts:
      - .build/ZestyEQ.unsigned.ipa
      - .build/screenshots/*.png
      - .build/Build/Products/Debug-iphoneos/ZestyEQ.app
      - .build/Build/Products/Debug-iphonesimulator/ZestyEQ.app
      - .build/Build/Products/**/*.dSYM.zip
    publishing: {}
